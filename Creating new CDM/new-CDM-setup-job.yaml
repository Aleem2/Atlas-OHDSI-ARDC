apiVersion: v1
kind: ConfigMap
metadata:
  name: cdm-setup-script-2
data:
  cdm-setup-script.sql: |
    -----------------------------
    --------------------------------
    -- replace CDM-sample by a CDM database name and jdbc url with correct url name in all statements. 

    -- Adding CMD to application DB -- linked https://github.com/OHDSI/WebAPI/wiki/CDM-Configuration. The last part specifically. 
    -------------------------------
    ------------------------------
    \connect ohdsi
    INSERT INTO webapi.source (source_id, source_name, source_key, source_connection, source_dialect, is_cache_enabled) 
    SELECT nextval('webapi.source_sequence') , 'CDM-Australian-Synth', 'CDM-Australian-Synth', 'jdbc:postgresql://postgres-cdm2:5432/postgres?user=postgres&password=admin-cdm2', 'postgresql', true;

    -- CDM tables and it is read only. 
    INSERT INTO webapi.source_daimon (source_daimon_id, source_id, daimon_type, table_qualifier, priority) 
    SELECT nextval('webapi.source_daimon_sequence'), source_id, 0, 'cdm_synthea', 0
    FROM webapi.source
    WHERE source_key = 'CDM-Australian-Synth'
    ;

    -- vocabulary table and it is read only. 
    INSERT INTO webapi.source_daimon (source_daimon_id, source_id, daimon_type, table_qualifier, priority) 
    SELECT nextval('webapi.source_daimon_sequence'), source_id, 1, 'cdm_synthea', 1
    FROM webapi.source
    WHERE source_key = 'CDM-Australian-Synth'
    ;

    -- result tables and it needs read write access. 
    INSERT INTO webapi.source_daimon (source_daimon_id, source_id, daimon_type, table_qualifier, priority) 
    SELECT nextval('webapi.source_daimon_sequence'), source_id, 2, 'results_synthea', 1
    FROM webapi.source
    WHERE source_key = 'CDM-Australian-Synth'
    ;

    -- temp tables and it needs read write access. 
    INSERT INTO webapi.source_daimon (source_daimon_id, source_id, daimon_type, table_qualifier, priority) 
    SELECT nextval('webapi.source_daimon_sequence'), source_id, 5, 'temp_synthea', 0
    FROM webapi.source
    WHERE source_key = 'CDM-Australian-Synth'
    ;

---


apiVersion: batch/v1
kind: Job
metadata:
  creationTimestamp: null
  name: postgres-cdm2-setup
spec:
  template:
    metadata:
      creationTimestamp: null
    spec:
      containers:
      - command:
        - sh
        - -c
        - sleep 240; psql -h postgres -p 5432 -U postgres -d ohdsi -f /home/cdm-setup-script.sql
        image: postgres:15.9-bullseye
        name: postgres-cdm2-setup
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: atlas-secrets
              key: postgres-password
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: atlas-secrets
              key: postgres-password

        volumeMounts:
        - name: init-script
          mountPath: /home/

      volumes:
      - name: init-script
        configMap:
          name: cdm-setup-script-2
    
      restartPolicy: Never
status: {}


